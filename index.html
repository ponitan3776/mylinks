<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>my-link-portal</title>
    <style>
        /* CSSは以前のものを流用しつつ、タイピング用を追加 */
        body { background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; margin: 0; }
        #typing-area { font-size: 1.5rem; color: #fb7185; height: 3em; margin: 20px 0; font-weight: bold; }
        /* ...他は以前のCSSと同じ... */
    </style>
</head>
<body>

    <div class="hero">
        <div id="typing-area"></div>
        <h1>my-link-portal</h1>
        </div>

    <script>
        const greeting = ["おはよう！", "こんにちは！", "こんばんは！"];
        const messages = ["今日も開発日和ですね。", "新しい発見があるかも？", "何か楽しいこと、探してみない？", "ゆっくり遊んでいってね！"];

        function startTyping() {
            const hour = new Date().getHours();
            const baseGreeting = (hour >= 5 && hour < 12) ? greeting[0] : (hour >= 12 && hour < 18) ? greeting[1] : greeting[2];
            const msg = messages[Math.floor(Math.random() * messages.length)];
            const fullText = baseGreeting + msg;

            const el = document.getElementById('typing-area');
            let i = 0;
            
            // ローマ字風に一文字ずつ表示するアニメーション
            const timer = setInterval(() => {
                el.innerText = fullText.slice(0, i);
                i++;
                if (i > fullText.length) clearInterval(timer);
            }, 200);
        }

        window.onload = startTyping;
        
        // ...以前のキラキラエフェクトと音楽機能のスクリプトをここに続ける...
    </script>
</body>
</html>

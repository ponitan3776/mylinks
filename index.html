<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my-link-portal</title>
    <style>
        body { background: #0f172a; color: white; font-family: 'Courier New', monospace; text-align: center; padding: 20px; margin: 0; }
        .hero { margin: 40px 0; min-height: 150px; }
        
        /* タイピングエリア：文字が浮き上がる演出 */
        #typing-area { font-size: 1.5rem; color: #fb7185; font-weight: bold; height: 3rem; position: relative; }
        .romaji { position: absolute; width: 100%; transition: all 0.5s ease; opacity: 1; }
        .jp { position: absolute; width: 100%; transition: all 0.5s ease; opacity: 0; transform: translateY(20px); }
        .cursor { display: inline-block; width: 10px; height: 1.5rem; background: #fb7185; animation: blink 0.8s infinite; vertical-align: middle; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* ...他のCSSはそのまま... */
    </style>
</head>
<body>

    <div class="hero">
        <div id="typing-area"><div id="text-container"></div></div>
        <h1>my-link-portal</h1>
        </div>

    <script>
        const data = { romaji: "konnnitiwa", jp: "こんにちは！" };

        async function typeReal() {
            const container = document.getElementById('text-container');
            
            // 1. ローマ字を入力
            const romajiDiv = document.createElement('div');
            romajiDiv.className = 'romaji';
            container.appendChild(romajiDiv);
            
            for (let i = 0; i <= data.romaji.length; i++) {
                romajiDiv.innerHTML = data.romaji.slice(0, i) + '<span class="cursor"></span>';
                await new Promise(r => setTimeout(r, 150));
            }
            
            // 2. 変換アニメーション（ローマ字が上に消え、日本語が現れる）
            const jpDiv = document.createElement('div');
            jpDiv.className = 'jp';
            jpDiv.innerText = data.jp;
            container.appendChild(jpDiv);
            
            await new Promise(r => setTimeout(r, 100));
            romajiDiv.style.opacity = '0';
            romajiDiv.style.transform = 'translateY(-20px)';
            jpDiv.style.opacity = '1';
            jpDiv.style.transform = 'translateY(0)';
        }

        typeReal();
    </script>
</body>
</html>

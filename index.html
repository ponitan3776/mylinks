<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my-link-portal</title>
    <style>
        body { background: #0f172a; color: white; font-family: 'Courier New', monospace; text-align: center; padding: 20px; margin: 0; }
        .hero { margin: 40px 0; min-height: 200px; }
        
        #typing-area { 
            font-size: 1.5rem; 
            color: #fb7185; 
            font-weight: bold; 
            height: 3rem; 
            position: relative; 
            display: inline-block; 
            margin: 0 auto;
        }
        #text-container { position: relative; display: inline-block; }
        .romaji { position: absolute; left: 50%; transform: translateX(-50%); transition: all 0.5s ease; opacity: 1; white-space: nowrap; }
        .jp { position: absolute; left: 50%; transform: translateX(-50%) translateY(20px); transition: all 0.5s ease; opacity: 0; white-space: nowrap; }
        .cursor { display: inline-block; width: 10px; height: 1.5rem; background: #fb7185; animation: blink 0.8s infinite; vertical-align: middle; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .btn { background: #fb7185; border: none; padding: 10px 20px; border-radius: 20px; color: white; cursor: pointer; font-size: 0.9rem; transition: 0.3s; margin: 5px; }
        .btn:hover { background: #e11d48; transform: scale(1.05); }
        .card { background: #1e293b; padding: 30px; border-radius: 20px; text-decoration: none; color: white; display: block; max-width: 600px; margin: 40px auto; border: 2px solid #334155; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: #fb7185; background: #334155; }
        .update-info { font-size: 0.9rem; color: #94a3b8; margin-top: 20px; border-top: 1px solid #334155; padding-top: 15px; }
        h2 { margin-top: 0; color: #f472b6; }
    </style>
</head>
<body>

    <div class="hero">
        <div id="typing-area"><div id="text-container"></div></div>
        <h1>my-link-portal</h1>
        <div>
            <button class="btn" onclick="playMusic('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3')">Chill</button>
            <button class="btn" onclick="playMusic('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3')">Upbeat</button>
            <button class="btn" onclick="stopMusic()">Stop</button>
        </div>
        <audio id="bgm" loop></audio>
    </div>

    <a class="card" href="https://blockblitz-ouqi.onrender.com" target="_blank">
        <h2>ブロックブリッツ</h2>
        <p>ランキング機能、アカウント機能、チャット機能を搭載した新バージョンが登場！</p>
        <div class="update-info">
            <strong>Version:</strong> v1.0.0 | <strong>Last Update:</strong> 2026/7/16<br>
            <span style="color:#fb7185;">[ 更新内容: ランキング機能、アカウント機能、チャット機能の追加 ]</span>
        </div>
    </a>

    <script>
        // ローマ字→かな の変換テーブル（入力途中の状態も含む）
        // キー：現在の入力文字列、値：[残りの入力文字列, 確定かな]
        const romajiToKanaMap = {
            'a': ['', 'あ'], 'i': ['', 'い'], 'u': ['', 'う'], 'e': ['', 'え'], 'o': ['', 'お'],
            'ka': ['', 'か'], 'ki': ['', 'き'], 'ku': ['', 'く'], 'ke': ['', 'け'], 'ko': ['', 'こ'],
            'sa': ['', 'さ'], 'si': ['', 'し'], 'su': ['', 'す'], 'se': ['', 'せ'], 'so': ['', 'そ'],
            'ta': ['', 'た'], 'ti': ['', 'ち'], 'tu': ['', 'つ'], 'te': ['', 'て'], 'to': ['', 'と'],
            'na': ['', 'な'], 'ni': ['', 'に'], 'nu': ['', 'ぬ'], 'ne': ['', 'ね'], 'no': ['', 'の'],
            'ha': ['', 'は'], 'hi': ['', 'ひ'], 'hu': ['', 'ふ'], 'he': ['', 'へ'], 'ho': ['', 'ほ'],
            'ma': ['', 'ま'], 'mi': ['', 'み'], 'mu': ['', 'む'], 'me': ['', 'め'], 'mo': ['', 'も'],
            'ya': ['', 'や'], 'yu': ['', 'ゆ'], 'yo': ['', 'よ'],
            'ra': ['', 'ら'], 'ri': ['', 'り'], 'ru': ['', 'る'], 're': ['', 'れ'], 'ro': ['', 'ろ'],
            'wa': ['', 'わ'], 'wo': ['', 'を'], 'nn': ['', 'ん'],
            'ga': ['', 'が'], 'gi': ['', 'ぎ'], 'gu': ['', 'ぐ'], 'ge': ['', 'げ'], 'go': ['', 'ご'],
            'za': ['', 'ざ'], 'zi': ['', 'じ'], 'zu': ['', 'ず'], 'ze': ['', 'ぜ'], 'zo': ['', 'ぞ'],
            'da': ['', 'だ'], 'di': ['', 'ぢ'], 'du': ['', 'づ'], 'de': ['', 'で'], 'do': ['', 'ど'],
            'ba': ['', 'ば'], 'bi': ['', 'び'], 'bu': ['', 'ぶ'], 'be': ['', 'べ'], 'bo': ['', 'ぼ'],
            'pa': ['', 'ぱ'], 'pi': ['', 'ぴ'], 'pu': ['', 'ぷ'], 'pe': ['', 'ぺ'], 'po': ['', 'ぽ'],
            'kya': ['', 'きゃ'], 'kyu': ['', 'きゅ'], 'kyo': ['', 'きょ'],
            'sya': ['', 'しゃ'], 'syu': ['', 'しゅ'], 'syo': ['', 'しょ'],
            'tya': ['', 'ちゃ'], 'tyu': ['', 'ちゅ'], 'tyo': ['', 'ちょ'],
            'nya': ['', 'にゃ'], 'nyu': ['', 'にゅ'], 'nyo': ['', 'にょ'],
            'hya': ['', 'ひゃ'], 'hyu': ['', 'ひゅ'], 'hyo': ['', 'ひょ'],
            'mya': ['', 'みゃ'], 'myu': ['', 'みゅ'], 'myo': ['', 'みょ'],
            'rya': ['', 'りゃ'], 'ryu': ['', 'りゅ'], 'ryo': ['', 'りょ'],
            'gya': ['', 'ぎゃ'], 'gyu': ['', 'ぎゅ'], 'gyo': ['', 'ぎょ'],
            'zya': ['', 'じゃ'], 'zyu': ['', 'じゅ'], 'zyo': ['', 'じょ'],
            'bya': ['', 'びゃ'], 'byu': ['', 'びゅ'], 'byo': ['', 'びょ'],
            'pya': ['', 'ぴゃ'], 'pyu': ['', 'ぴゅ'], 'pyo': ['', 'ぴょ'],
            // 入力途中の状態（子音のみ）
            'k': ['a,i,u,e,o,ya,yu,yo', ''], 's': ['a,i,u,e,o,ya,yu,yo', ''], 
            't': ['a,i,u,e,o,ya,yu,yo', ''], 'n': ['a,i,u,e,o,ya,yu,yo,n', ''],
            'h': ['a,i,u,e,o,ya,yu,yo', ''], 'm': ['a,i,u,e,o,ya,yu,yo', ''],
            'y': ['a,u,o', ''], 'r': ['a,i,u,e,o,ya,yu,yo', ''],
            'w': ['a,o', ''], 'g': ['a,i,u,e,o,ya,yu,yo', ''],
            'z': ['a,i,u,e,o,ya,yu,yo', ''], 'd': ['a,i,u,e,o', ''],
            'b': ['a,i,u,e,o,ya,yu,yo', ''], 'p': ['a,i,u,e,o,ya,yu,yo', ''],
            ',': ['', '、'], '.': ['', '。'], '!': ['', '！'], '?': ['', '？'],
            '-': ['', 'ー'], '~': ['', '〜'], ' ': ['', ' '],
            'n': ['a,i,u,e,o,ya,yu,yo,n', 'ん'], // n が単独で「ん」になるケースは文脈次第なので簡易的に
        };

        // 時間帯別の挨拶とメッセージ
        const phrases = {
            morning: {
                greeting: "おはよう！",
                messages: [
                    "今日もいい天気になりそうですね。",
                    "朝の空気は気持ちいいですね。",
                    "ゆっくり過ごせそうな朝ですね。",
                    "今日は何をしようかな？",
                    "素敵な一日になりますように。"
                ]
            },
            day: {
                greeting: "こんにちは！",
                messages: [
                    "ちょっと一息つきませんか？",
                    "今日は何かいいことありましたか？",
                    "お昼ごはんはもう食べましたか？",
                    "リラックスして過ごしてくださいね。",
                    "元気に過ごせていますように。"
                ]
            },
            night: {
                greeting: "こんばんは！",
                messages: [
                    "今日も一日お疲れ様でした。",
                    "ゆっくり休んでくださいね。",
                    "夜の時間を楽しんでいますか？",
                    "明日もいい日になりますように。",
                    "暖かくしてゆっくりしてくださいね。",
                    "おやすみなさい、また明日。"
                ]
            }
        };

        // 日本語テキスト→ローマ字シーケンスに分解
        function textToRomajiSequence(text) {
            const map = {
                'あ':'a','い':'i','う':'u','え':'e','お':'o',
                'か':'ka','き':'ki','く':'ku','け':'ke','こ':'ko',
                'さ':'sa','し':'si','す':'su','せ':'se','そ':'so',
                'た':'ta','ち':'ti','つ':'tu','て':'te','と':'to',
                'な':'na','に':'ni','ぬ':'nu','ね':'ne','の':'no',
                'は':'ha','ひ':'hi','ふ':'hu','へ':'he','ほ':'ho',
                'ま':'ma','み':'mi','む':'mu','め':'me','も':'mo',
                'や':'ya','ゆ':'yu','よ':'yo',
                'ら':'ra','り':'ri','る':'ru','れ':'re','ろ':'ro',
                'わ':'wa','を':'wo','ん':'nn',
                'が':'ga','ぎ':'gi','ぐ':'gu','げ':'ge','ご':'go',
                'ざ':'za','じ':'zi','ず':'zu','ぜ':'ze','ぞ':'zo',
                'だ':'da','ぢ':'di','づ':'du','で':'de','ど':'do',
                'ば':'ba','び':'bi','ぶ':'bu','べ':'be','ぼ':'bo',
                'ぱ':'pa','ぴ':'pi','ぷ':'pu','ぺ':'pe','ぽ':'po',
                'きゃ':'kya','きゅ':'kyu','きょ':'kyo',
                'しゃ':'sya','しゅ':'syu','しょ':'syo',
                'ちゃ':'tya','ちゅ':'tyu','ちょ':'tyo',
                'にゃ':'nya','にゅ':'nyu','にょ':'nyo',
                'ひゃ':'hya','ひゅ':'hyu','ひょ':'hyo',
                'みゃ':'mya','みゅ':'myu','みょ':'myo',
                'りゃ':'rya','りゅ':'ryu','りょ':'ryo',
                'ぎゃ':'gya','ぎゅ':'gyu','ぎょ':'gyo',
                'じゃ':'zya','じゅ':'zyu','じょ':'zyo',
                'びゃ':'bya','びゅ':'byu','びょ':'byo',
                'ぴゃ':'pya','ぴゅ':'pyu','ぴょ':'pyo',
                'っ':'xtu','、':',','。':'.','！':'!','？':'?',
                'ー':'-','〜':'~',' ':' '
            };
            
            let sequence = [];
            let i = 0;
            while (i < text.length) {
                let found = false;
                // 3文字チェック
                if (i + 2 < text.length && map[text.slice(i, i + 3)]) {
                    sequence.push(map[text.slice(i, i + 3)]);
                    i += 3;
                    found = true;
                }
                // 2文字チェック
                else if (i + 1 < text.length && map[text.slice(i, i + 2)]) {
                    sequence.push(map[text.slice(i, i + 2)]);
                    i += 2;
                    found = true;
                }
                // 1文字チェック
                else if (map[text[i]]) {
                    sequence.push(map[text[i]]);
                    i++;
                    found = true;
                }
                else {
                    sequence.push(text[i]);
                    i++;
                }
            }
            return sequence;
        }

        // ローマ字シーケンスを1文字ずつのタイピングシーケンスに分解
        // 例: 'ka' → ['k', 'a']  と表示、'a'を打った瞬間「か」が確定
        function romajiToTypingSequence(romaji) {
            let chars = [];
            for (let i = 0; i < romaji.length; i++) {
                chars.push({
                    char: romaji[i],
                    isComplete: (i === romaji.length - 1) // 最後の文字で確定
                });
            }
            return chars;
        }

        let currentTimeZone = null;
        let animationRunning = false;
        let abortFlag = false;

        function getTimeZone() {
            const hour = new Date().getHours();
            if (hour >= 5 && hour < 12) return 'morning';
            else if (hour >= 12 && hour < 18) return 'day';
            else return 'night';
        }

        async function typeReal() {
            if (animationRunning) {
                abortFlag = true;
                // 現在のアニメーションが終わるのを待つ
                await new Promise(r => setTimeout(r, 200));
            }
            
            animationRunning = true;
            abortFlag = false;
            currentTimeZone = getTimeZone();
            
            const container = document.getElementById('text-container');
            const category = phrases[currentTimeZone];
            const randomMessage = category.messages[Math.floor(Math.random() * category.messages.length)];
            const fullText = category.greeting + randomMessage;
            
            // 既存の要素をクリア
            container.innerHTML = '';
            
            const romajiDiv = document.createElement('div');
            romajiDiv.className = 'romaji';
            container.appendChild(romajiDiv);
            
            const jpDiv = document.createElement('div');
            jpDiv.className = 'jp';
            jpDiv.style.opacity = '0';
            jpDiv.style.transform = 'translateX(-50%) translateY(20px)';
            container.appendChild(jpDiv);
            
            // 表示用：ローマ字（確定部分 + 未確定部分） + かな（確定部分）
            let displayRomaji = '';   // 表示用ローマ字全体
            let displayKana = '';     // 確定かな
            
            // 全テキストのローマ字シーケンスを取得
            const romajiSequence = textToRomajiSequence(fullText);
            
            // 各ローマ字ブロックを1文字ずつタイピング
            for (let blockIndex = 0; blockIndex < romajiSequence.length; blockIndex++) {
                if (abortFlag) { animationRunning = false; return; }
                
                const block = romajiSequence[blockIndex];
                const typingChars = romajiToTypingSequence(block);
                
                for (let charIndex = 0; charIndex < typingChars.length; charIndex++) {
                    if (abortFlag) { animationRunning = false; return; }
                    
                    displayRomaji += typingChars[charIndex].char;
                    
                    // 「ら」を打つとき：Rを表示 → Aを打った瞬間「ら」に変換
                    if (typingChars[charIndex].isComplete) {
                        // ブロック完了：かなに変換
                        const completedRomaji = block;
                        let convertedKana = '';
                        // 変換テーブルから検索
                        if (romajiToKanaMap[completedRomaji]) {
                            convertedKana = romajiToKanaMap[completedRomaji][1];
                        } else {
                            convertedKana = completedRomaji; // fallback
                        }
                        displayKana += convertedKana;
                    }
                    
                    // 表示更新
                    romajiDiv.innerHTML = displayRomaji + '<span class="cursor"></span>';
                    jpDiv.innerText = displayKana;
                    
                    await new Promise(r => setTimeout(r, 80));
                }
            }
            
            if (abortFlag) { animationRunning = false; return; }
            
            // タイピング完了：ローマ字をフェードアウト、かなをフェードイン
            await new Promise(r => setTimeout(r, 500));
            
            romajiDiv.style.opacity = '0';
            romajiDiv.style.transform = 'translateX(-50%) translateY(-20px)';
            jpDiv.style.opacity = '1';
            jpDiv.style.transform = 'translateX(-50%) translateY(0)';
            
            // 8秒間表示
            await new Promise(r => setTimeout(r, 8000));
            
            if (abortFlag) { animationRunning = false; return; }
            
            animationRunning = false;
            typeReal(); // 次のメッセージへ
        }

        // 時間帯変更を監視
        function watchTimeZone() {
            setInterval(() => {
                const newZone = getTimeZone();
                if (newZone !== currentTimeZone) {
                    // 時間帯が変わった！リセットして最初から
                    currentTimeZone = newZone;
                    typeReal();
                }
            }, 1000); // 1秒ごとにチェック
        }

        function playMusic(url) {
            const audio = document.getElementById('bgm');
            audio.src = url;
            audio.play();
        }
        function stopMusic() {
            document.getElementById('bgm').pause();
        }

        typeReal();
        watchTimeZone();
    </script>
</body>
</html>

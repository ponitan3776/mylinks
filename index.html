<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>my-link-portal</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .hero { margin: 40px 0; }
        .music-controls { margin-top: 20px; display: flex; justify-content: center; gap: 10px; }
        .btn { background: #fb7185; border: none; padding: 10px 20px; border-radius: 20px; color: white; cursor: pointer; font-size: 0.9rem; }
        .btn:hover { background: #e11d48; }
        .card { background: #1e293b; padding: 30px; border-radius: 20px; text-decoration: none; color: white; display: block; max-width: 600px; margin: 0 auto; border: 2px solid #334155; }
        .update-info { font-size: 0.9rem; color: #94a3b8; margin-top: 15px; border-top: 1px solid #334155; padding-top: 10px; }
    </style>
</head>
<body>

    <div class="hero">
        <h1>my-link-portal</h1>
        <p>好きなBGMを選んでスタート！</p>
        
        <div class="music-controls">
            <button class="btn" onclick="playMusic('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3')">Chill</button>
            <button class="btn" onclick="playMusic('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3')">Upbeat</button>
            <button class="btn" onclick="playMusic('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-16.mp3')">Relax</button>
            <button class="btn" onclick="stopMusic()">Stop</button>
        </div>
        <audio id="bgm" loop></audio>
    </div>

    <a class="card" href="https://nakamura.onrender.com" target="_blank">
        <h2>キャンディブラスト</h2>
        <p>試作プロジェクトなので、バグや物足りない部分がありますがアップデートを重ねて面白くしていけるようにしたいです！新しい機能の案が言ったら言ってね</p>
        <div class="update-info">
            <strong>Version:</strong> v0.0.1 | <strong>Last Update:</strong> 2026年7月12日
        </div>
    </a>

    <script>
        function playMusic(url) {
            const audio = document.getElementById('bgm');
            audio.src = url;
            audio.play();
        }
        function stopMusic() {
            const audio = document.getElementById('bgm');
            audio.pause();
            audio.currentTime = 0;
        }
    </script>
</body>
</html>
